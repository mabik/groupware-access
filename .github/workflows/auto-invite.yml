name: Auto-invite to private repo

# 동작:
# 1. 사용자가 access-request 폼으로 issue 작성 (잠시 공개됨, 수 초~1분)
# 2. 본 워크플로우가 즉시 작동:
#    a. 입력값 파싱
#    b. 협업자 등록 (자동초대)
#    c. 감사 로그를 private audit 리포에 복사 (PII 보존)
#    d. 원본 issue body를 "[처리됨]"으로 redact (edit history도 sanitize)
#    e. 원본 issue 삭제 (공개 흔적 제거)
# 3. 사용자에게는 GitHub 초대 메일이 도착 (자기 verified email로)
#
# Privacy 모드 옵션:
#   PRIVACY_MODE=delete  (기본) — issue redact + 삭제, 공개 흔적 zero
#   PRIVACY_MODE=lock           — issue redact + 잠금, 공개 흔적은 "[처리됨]"만
#   PRIVACY_MODE=keep            — 원본 그대로 (디버깅용, 운영 미권장)

on:
  issues:
    types: [opened]

permissions:
  issues: write

jobs:
  invite:
    if: contains(github.event.issue.labels.*.name, 'access-request')
    runs-on: ubuntu-latest
    env:
      PRIVATE_OWNER: mabik
      PRIVATE_REPO: groupware
      ALLOWED_DOMAIN: mabik.re.kr
      AUDIT_OWNER: mabik
      AUDIT_REPO: groupware-audit
      PRIVACY_MODE: delete
      # Admin/bot 계정 — 콤마 구분 GitHub username 목록. 향후 추가 검증을
      # 도입할 경우 이 목록의 계정은 우회시킨다.
      ADMIN_USERNAMES: "methylome,mabik-bot"
    steps:
      - name: Checkout (필요 — issue parser가 템플릿 파일을 디스크에서 읽음)
        uses: actions/checkout@v4

      - name: Mask PII in logs
        env:
          BODY: ${{ github.event.issue.body }}
        run: |
          # 본문 전체를 즉시 마스킹 처리. Action 로그에 PII가 새지 않도록.
          echo "::add-mask::${BODY}"

      - name: Parse issue body
        id: parse
        uses: stefanbuck/github-issue-parser@v3
        with:
          template-path: .github/ISSUE_TEMPLATE/access-request.yml

      - name: Mask parsed values in logs
        run: |
          echo "::add-mask::${{ steps.parse.outputs.issueparser_full_name }}"
          echo "::add-mask::${{ steps.parse.outputs.issueparser_department }}"

      - name: Normalize issue title (overwrite user-edited title)
        uses: actions/github-script@v7
        env:
          USERNAME: ${{ steps.parse.outputs.issueparser_github_username }}
        with:
          github-token: ${{ secrets.ADMIN_PAT }}
          script: |
            const username = (process.env.USERNAME || '').trim() || 'unknown';
            await github.rest.issues.update({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              title: `[액세스 요청] @${username}`,
            });

      - name: Validate, invite, audit-log
        id: process
        uses: actions/github-script@v7
        env:
          USERNAME: ${{ steps.parse.outputs.issueparser_github_username }}
          FULL_NAME: ${{ steps.parse.outputs.issueparser_full_name }}
          DEPT: ${{ steps.parse.outputs.issueparser_department }}
          CLIENT: ${{ steps.parse.outputs.issueparser_client }}
          PURPOSE: ${{ steps.parse.outputs.issueparser_purpose }}
        with:
          github-token: ${{ secrets.ADMIN_PAT }}
          script: |
            const {
              USERNAME, FULL_NAME, DEPT, CLIENT, PURPOSE,
              PRIVATE_OWNER, PRIVATE_REPO, ALLOWED_DOMAIN,
              AUDIT_OWNER, AUDIT_REPO, ADMIN_USERNAMES,
            } = process.env;

            const submitter = context.payload.issue.user.login.toLowerCase();
            const adminList = (ADMIN_USERNAMES || '')
              .split(',').map(s => s.trim().toLowerCase()).filter(Boolean);
            const isAdmin = adminList.includes(submitter);

            // Helper: 결과(어떤 분기든)를 audit 리포에 기록.
            // invite 단계에서 어떤 분기로 가든 한 건씩 audit issue를 남긴다.
            const writeAudit = async (status, extra = {}) => {
              try {
                await github.rest.issues.create({
                  owner: AUDIT_OWNER,
                  repo: AUDIT_REPO,
                  title: `[${status}] @${(USERNAME || 'unknown').trim()}` +
                         (FULL_NAME ? ` (${FULL_NAME.trim()})` : ''),
                  body: [
                    '## 액세스 요청 처리 기록',
                    '',
                    `**status:** ${status}`,
                    extra.reason ? `**reason:** ${extra.reason}` : '',
                    '',
                    '| 항목 | 값 |',
                    '|------|-----|',
                    `| 작성자(GitHub) | @${submitter} |`,
                    `| GitHub 사용자명(폼) | @${(USERNAME || '').trim() || '-'} |`,
                    `| 성명 | ${(FULL_NAME || '').trim() || '-'} |`,
                    `| 이메일(추정) | ${extra.email || '-'} |`,
                    `| 부서 | ${(DEPT || '').trim() || '-'} |`,
                    `| 사용 환경 | ${(CLIENT || '').trim() || '-'} |`,
                    `| 사용 목적 | ${(PURPOSE || '').trim() || '-'} |`,
                    `| 처리 시각 | ${new Date().toISOString()} |`,
                    `| 원본 신청 | ${context.repo.owner}/${context.repo.repo}#${context.issue.number} (삭제 예정) |`,
                    `| Admin allowlist? | ${isAdmin ? 'yes' : 'no'} |`,
                  ].filter(Boolean).join('\n'),
                  labels: ['audit', status],
                });
              } catch (e) {
                core.warning(`Audit log creation failed: ${e.message}`);
              }
            };

            const setStatus = async (status, reason, extra = {}) => {
              core.setOutput('status', status);
              if (reason) core.setOutput('reason', reason);
              await writeAudit(status, { ...extra, reason });
            };

            // 1) 필수 필드
            const username = (USERNAME || '').trim();
            const fullName = (FULL_NAME || '').trim();
            if (!username || !fullName) {
              return setStatus('rejected', 'GitHub 사용자명 또는 성명이 비어 있습니다.', { email: '-' });
            }

            // 2) 본인 인증 — issue 작성자(submitter)가 폼의 username과 일치해야 함.
            // 다른 사람을 사칭해 초대를 끌어가는 시나리오 차단.
            if (!isAdmin && submitter !== username.toLowerCase()) {
              return setStatus('rejected',
                `폼의 GitHub 사용자명(${username})이 issue 작성자(${submitter})와 일치하지 않습니다. 본인 계정으로 직접 신청해주세요.`,
                { email: '-' });
            }

            // 3) GitHub username 존재 + Public email 검증.
            // 이메일은 사용자가 Settings → Public profile → Public email로
            // 공개 설정한 verified 주소만 API에 노출되므로 실제 소유 증명임.
            // 비공개 상태면 .email === null → "Public email 미설정" 안내.
            let email;
            try {
              const u = await github.rest.users.getByUsername({ username });
              email = (u.data.email || '').toLowerCase();
            } catch (e) {
              return setStatus('rejected', `GitHub 사용자명을 찾을 수 없습니다.`, { email: '-' });
            }
            if (!isAdmin && !email) {
              return setStatus('rejected',
                `GitHub Public email이 설정되어 있지 않습니다. Settings → Public profile → Public email을 사내 이메일(@${ALLOWED_DOMAIN})로 지정 후 재신청해주세요. (초대 수락 후 다시 비공개로 돌릴 수 있습니다.)`,
                { email: '-' });
            }
            if (!isAdmin && !email.endsWith('@' + ALLOWED_DOMAIN)) {
              return setStatus('rejected',
                `GitHub Public email(${email})이 사내 도메인(@${ALLOWED_DOMAIN})이 아닙니다.`,
                { email });
            }

            // 4) 이미 협업자인지
            try {
              await github.rest.repos.checkCollaborator({
                owner: PRIVATE_OWNER, repo: PRIVATE_REPO, username,
              });
              return setStatus('already-member', '이미 협업자입니다.', { email });
            } catch (e) {
              if (e.status !== 404) {
                return setStatus('rejected', `협업자 상태 확인 실패: ${e.message}`, { email });
              }
            }

            // 5) 협업자 등록 (Read 권한)
            try {
              await github.rest.repos.addCollaborator({
                owner: PRIVATE_OWNER, repo: PRIVATE_REPO, username,
                permission: 'pull',
              });
            } catch (e) {
              return setStatus('rejected', `자동 초대 실패: ${e.message}`, { email });
            }

            return setStatus('invited', '초대 완료', { email });

      - name: Notify user (status comment)
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.ADMIN_PAT }}
          script: |
            const status = '${{ steps.process.outputs.status }}';
            const reason = `${{ steps.process.outputs.reason }}`;

            const messages = {
              'invited': '✅ 초대 메일이 발송됐습니다. 본인 GitHub 계정의 verified email을 확인하세요. 본 신청 기록은 개인정보 보호를 위해 곧 자동 삭제됩니다.',
              'already-member': 'ℹ️ 이미 협업자입니다. 추가 작업 필요 없습니다. 본 신청은 곧 자동 삭제됩니다.',
              'rejected': `❌ 거부 — ${reason}\n\n다시 신청하시려면 새 issue를 작성해주세요. 본 신청은 곧 자동 삭제됩니다.`,
            };

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: messages[status] || `처리 결과 없음`,
            });

      - name: Pre-redact body (sanitize edit history)
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.ADMIN_PAT }}
          script: |
            // edit history에 PII 잔존을 막기 위해 본문을 먼저 sanitize
            await github.rest.issues.update({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              title: '[처리됨]',
              body: '[processed - PII purged]',
              state: 'closed',
              state_reason: 'completed',
            });

      - name: Privacy action (delete | lock | keep)
        if: env.PRIVACY_MODE != 'keep'
        env:
          # OWNER_PAT은 issue 삭제 권한이 있는 org owner의 PAT (예: methylome).
          # ADMIN_PAT(mabik-bot)으로 fallback — lock 모드에서는 admin으로 충분.
          # delete 모드에서 OWNER_PAT 미설정 시 deleteIssue가 FORBIDDEN으로 실패함.
          GH_TOKEN: ${{ secrets.OWNER_PAT || secrets.ADMIN_PAT }}
          ISSUE_NODE_ID: ${{ github.event.issue.node_id }}
        run: |
          if [ "$PRIVACY_MODE" = "delete" ]; then
            echo "Deleting issue (PRIVACY_MODE=delete)..."
            gh api graphql -f query='
              mutation($id: ID!) {
                deleteIssue(input: { issueId: $id }) {
                  repository { id }
                }
              }
            ' -f id="$ISSUE_NODE_ID"
          elif [ "$PRIVACY_MODE" = "lock" ]; then
            echo "Locking issue (PRIVACY_MODE=lock)..."
            gh api -X PUT "repos/${{ github.repository }}/issues/${{ github.event.issue.number }}/lock" \
              -f lock_reason=resolved
          fi
