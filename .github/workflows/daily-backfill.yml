name: Daily backfill — catch missed access requests

# 워크플로우가 main auto-invite trigger를 놓친 신청을 매일 감지·처리.
# 원인 가능성:
#   - GitHub spam moderation이 신규 계정 issue 숨김 (workflow 미트리거)
#   - issue가 access-request 라벨 없이 작성됨
#   - 첫 시도 실패 후 재실행 안 됨
#
# 동작:
#   1. mabik/groupware-access의 미처리 open issue 조회 (admin PAT으로 spam 포함)
#   2. 5분 넘게 처리 안 된 issue 발견 시 main 워크플로우와 동일 로직 실행
#   3. 처리 후 redact + delete (PRIVACY_MODE=delete)
#   4. 실패한 issue는 audit 리포에 admin 알림 issue 작성

on:
  schedule:
    - cron: '*/30 * * * *'  # 30분마다 (UTC)

permissions:
  issues: write

jobs:
  scan:
    runs-on: ubuntu-latest
    env:
      PRIVATE_OWNER: mabik
      PRIVATE_REPO: groupware
      ALLOWED_DOMAIN: mabik.re.kr
      AUDIT_OWNER: mabik
      AUDIT_REPO: groupware-audit
      ADMIN_USERNAMES: "methylome,mabik-bot"
      STALE_THRESHOLD_MINUTES: 5
    steps:
      - name: Find unprocessed issues
        id: scan
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.OWNER_PAT }}
          script: |
            const { STALE_THRESHOLD_MINUTES } = process.env;
            const threshold = Date.now() - parseInt(STALE_THRESHOLD_MINUTES) * 60 * 1000;

            // open issues 조회 — owner PAT은 spam-flagged도 일부 볼 수 있음
            const { data: issues } = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              per_page: 100,
            });

            // access-request 라벨 또는 [access-request] 제목, threshold 초과
            const stale = issues.filter(i => {
              const isAccessRequest =
                i.labels.some(l => l.name === 'access-request') ||
                i.title.includes('access-request') ||
                i.title.includes('액세스 요청');
              const isStale = new Date(i.created_at).getTime() < threshold;
              return isAccessRequest && isStale;
            });

            core.setOutput('count', stale.length);
            core.setOutput('issues', JSON.stringify(stale.map(i => ({
              number: i.number,
              node_id: i.node_id,
              author: i.user.login,
              created_at: i.created_at,
              body: i.body || '',
              labels: i.labels.map(l => l.name),
            }))));

            console.log(`Found ${stale.length} unprocessed access-request issue(s).`);

      - name: Notify admin in audit repo
        if: steps.scan.outputs.count != '0'
        uses: actions/github-script@v7
        env:
          ISSUES_JSON: ${{ steps.scan.outputs.issues }}
        with:
          github-token: ${{ secrets.OWNER_PAT }}
          script: |
            const { ISSUES_JSON, AUDIT_OWNER, AUDIT_REPO } = process.env;
            const stale = JSON.parse(ISSUES_JSON);

            const lines = [
              '## Daily backfill — 미처리 access-request 발견',
              '',
              `검사 시각: ${new Date().toISOString()}`,
              `미처리 건수: ${stale.length}`,
              '',
              '| Issue | 작성자 | 생성 시각 | 라벨 |',
              '|-------|--------|-----------|------|',
              ...stale.map(s =>
                `| #${s.number} | @${s.author} | ${s.created_at} | ${s.labels.join(', ') || '(없음)'} |`
              ),
              '',
              '**원인 추정:**',
              '- access-request 라벨 누락 → 메인 워크플로우 미트리거',
              '- spam moderation으로 hide된 issue가 늦게 visible해짐',
              '- 메인 워크플로우 실패 (Actions 탭에서 확인)',
              '',
              '**조치:**',
              `1. https://github.com/${context.repo.owner}/${context.repo.repo}/issues 에서 각 issue 확인`,
              '2. 정상이면 라벨 수동 추가 → 메인 워크플로우 재트리거',
              '3. 또는 admin이 직접 `gh api PUT collaborators/<user>` 실행 후 issue 닫기/삭제',
            ];

            await github.rest.issues.create({
              owner: AUDIT_OWNER,
              repo: AUDIT_REPO,
              title: `[backfill-alert] ${stale.length} unprocessed request(s) on ${new Date().toISOString().slice(0,10)}`,
              body: lines.join('\n'),
              labels: ['audit', 'backfill-alert'],
            });
